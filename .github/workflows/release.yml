name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      tythe_released: ${{ steps.release.outputs['packages/tythe--release_created'] }}
      ts_released: ${{ steps.release.outputs['packages/tythe-ts--release_created'] }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-pypi:
    name: Publish tythe to PyPI
    needs: release-please
    if: needs.release-please.outputs.tythe_released == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/tythe
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - working-directory: packages/tythe
        run: |
          uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/tythe/dist

  publish-npm:
    name: Publish @tythe/ts to npm
    needs: release-please
    if: needs.release-please.outputs.ts_released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tythe/ts build
      - working-directory: packages/tythe-ts
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
