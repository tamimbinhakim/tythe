name: Stale issues

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,good-first-issue,help-wanted
          exempt-pr-labels: pinned,security
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not had
            activity in 60 days. It will be closed in 14 days if no further activity occurs.
            If it is still relevant, comment to keep it open.
          close-issue-message: >
            Closing as stale. If this is still an issue, please reopen with updated context.
          stale-pr-message: >
            This PR has been automatically marked as stale because it has not had
            activity in 30 days. It will be closed in 14 days if no further activity occurs.
