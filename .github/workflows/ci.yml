name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  commitlint:
    name: Lint commits
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Validate PR commits
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  lint-ts:
    name: Lint TS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint:ts
      - run: pnpm format:check:ts
      - run: pnpm format:check:docs
      - run: pnpm typecheck

  test-ts:
    name: Test TS · node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["22", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first: framework bindings import from "@tythe/ts" → ./dist,
      # so the runtime package has to be compiled before its consumers
      # run their vitest suite.
      - run: pnpm -r --filter=./packages/* run build
      - run: pnpm -r --filter=./packages/* run test

  lint-py:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - working-directory: packages/tythe
        run: |
          uv sync --all-extras --dev
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src

  test-py:
    name: Test Python · ${{ matrix.python }} · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - working-directory: packages/tythe
        run: |
          uv sync --all-extras --dev
          uv run pytest --cov=tythe --cov-report=xml -q
      - if: matrix.os == 'ubuntu-latest' && matrix.python == '3.13'
        uses: codecov/codecov-action@v6
        with:
          files: packages/tythe/coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}

  required:
    name: All checks passed
    needs: [lint-ts, test-ts, lint-py, test-py]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "All required checks passed."
